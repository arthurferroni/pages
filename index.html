<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Geolocalização automática</title>
</head>
<body>

  <h2>Obtendo sua localização...</h2>
  <p id="resultado">Aguardando permissão...</p>

  <script>
    window.onload = function() {
      const resultado = document.getElementById("resultado");

      if (!navigator.geolocation) {
        resultado.innerText = "Geolocalização não é suportada pelo seu navegador.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(posicao) {
          const lat = posicao.coords.latitude;
          const lon = posicao.coords.longitude;
          resultado.innerText = `Latitude: ${lat} | Longitude: ${lon}`;
        },
        function(erro) {
          switch(erro.code) {
            case erro.PERMISSION_DENIED:
              resultado.innerText = "Permissão negada.";
              break;
            case erro.POSITION_UNAVAILABLE:
              resultado.innerText = "Localização indisponível.";
              break;
            case erro.TIMEOUT:
              resultado.innerText = "Tempo de requisição excedido.";
              break;
            default:
              resultado.innerText = "Erro desconhecido.";
          }
        }
      );
    };
  </script>

</body>
</html>
